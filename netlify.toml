# netlify.toml — Hood Productions
# This file tells Netlify how to build and deploy your site

[build]
  publish = "."

# Redirect all 404s to a custom page (optional — create a 404.html if you want)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
